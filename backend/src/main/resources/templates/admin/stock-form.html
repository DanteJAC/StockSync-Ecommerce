<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/normalize.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <title>Admin Stock - StockSync</title>
</head>
<body class="admin-body">
<aside th:replace="~{fragments/admin-sidebar :: sidebar(seccionActiva='stock')}"></aside>
<main class="admin-main">
    <header th:replace="~{fragments/admin-sidebar :: topbar(titulo='Stock', subtitulo='Gestión del inventario')}"></header>
    <div class="admin-content">
        <div class="admin-panel">
            <div class="admin-panel__header">
                <!-- ✅ stock.id en lugar de stock.idStock -->
                <h2 class="admin-panel__title"
                    th:text="${stock.id != null} ? 'Editar Stock' : 'Nuevo Stock'">Formulario</h2>
            </div>
            <div class="admin-panel__body">
                <form th:action="@{/admin/stock/guardar}" method="post" class="admin-form">
                    <!-- ✅ stock.id en lugar de stock.idStock -->
                    <input type="hidden" name="id" th:value="${stock.id}">

                    <div class="admin-form__row">
                        <div class="admin-form__group">
                            <label class="admin-form__label" for="productId">Producto</label>
                            <select class="admin-form__select" id="productId" name="productId" required>
                                <option value="">-- Selecciona un producto --</option>
                                <!-- ✅ p.id en lugar de p.idProducto, comparando con stock.productId -->
                                <option th:each="p : ${productos}"
                                        th:value="${p.id}"
                                        th:text="${p.nombre}"
                                        th:selected="${stock.productId != null and stock.productId == p.id}">
                                </option>
                            </select>
                        </div>
                        <div class="admin-form__group">
                            <label class="admin-form__label" for="warehouseId">Bodega</label>
                            <select class="admin-form__select" id="warehouseId" name="warehouseId" required>
                                <option value="">-- Selecciona una bodega --</option>
                                <!-- ✅ b.id en lugar de b.idBodega, comparando con stock.warehouseId -->
                                <option th:each="b : ${bodegas}"
                                        th:value="${b.id}"
                                        th:text="${b.nombre}"
                                        th:selected="${stock.warehouseId != null and stock.warehouseId == b.id}">
                                </option>
                            </select>
                        </div>
                    </div>

                    <div class="admin-form__group">
                        <label class="admin-form__label" for="quantity">Cantidad</label>
                        <!-- ✅ stock.quantity en lugar de stock.cantidad -->
                        <input class="admin-form__input" type="number" id="quantity" name="quantity"
                               th:value="${stock.quantity}" placeholder="0" min="0" required>
                    </div>

                    <div class="admin-form__actions">
                        <button type="submit" class="admin-btn admin-btn--primary">💾 Guardar</button>
                        <a th:href="@{/admin/stock}" class="admin-btn admin-btn--secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>
<script>
    function toggleSidebar() {
        document.getElementById('adminSidebar').classList.toggle('admin-sidebar--open');
    }
</script>
</body>
</html>
