<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/normalize.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <title>Admin Stock - StockSync</title>
</head>
<body class="admin-body">
<aside th:replace="~{fragments/admin-sidebar :: sidebar(seccionActiva='stock')}"></aside>
<main class="admin-main">
    <header th:replace="~{fragments/admin-sidebar :: topbar(titulo='Stock', subtitulo='Gestión del inventario por bodega')}"></header>
    <div class="admin-content">

        <div th:if="${successMsg}" class="admin-alert admin-alert--success">
            <span>✅</span> <span th:text="${successMsg}">Éxito</span>
        </div>
        <div th:if="${errorMsg}" class="admin-alert admin-alert--error">
            <span>❌</span> <span th:text="${errorMsg}">Error</span>
        </div>

        <div class="admin-panel">
            <div class="admin-panel__header">
                <h2 class="admin-panel__title">Registros de Stock</h2>
                <a th:href="@{/admin/stock/nuevo}" class="admin-btn admin-btn--primary">+ Nuevo Registro</a>
            </div>
            <div class="admin-panel__body">
                <div class="admin-table__wrapper">
                    <table class="admin-table">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Producto</th>
                            <th>Bodega</th>
                            <th>Cantidad</th>
                            <th>Última Actualización</th>
                            <th>Acciones</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${stocks.isEmpty()}">
                            <td colspan="6" class="admin-table__empty">No hay registros de stock.</td>
                        </tr>
                        <tr th:each="s : ${stocks}">
                            <td th:text="${s.id}">1</td>                              <!-- ✅ -->
                            <td class="admin-table__name" th:text="${s.productName}">Producto</td>   <!-- ✅ -->
                            <td th:text="${s.warehouseName}">Bodega</td>              <!-- ✅ -->
                            <td>
                                <span class="admin-stock-badge" th:text="${s.quantity}">0</span>     <!-- ✅ -->
                            </td>
                            <td th:text="${s.lastUpdate}">2026-01-01</td>             <!-- ✅ -->
                            <td class="admin-table__actions">
                                <a th:href="@{/admin/stock/editar/{id}(id=${s.id})}"
                                   class="admin-btn admin-btn--edit">✏️ Editar</a>   <!-- ✅ -->
                                <a th:href="@{/admin/stock/eliminar/{id}(id=${s.id})}"
                                   class="admin-btn admin-btn--delete"
                                   onclick="return confirm('¿Estás seguro?')">🗑️</a> <!-- ✅ -->
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>
<script>
    function toggleSidebar() {
        document.getElementById('adminSidebar').classList.toggle('admin-sidebar--open');
    }
</script>
</body>
</html>
