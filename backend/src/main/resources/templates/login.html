<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - StockSync Admin</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="admin-login-body">
<div class="login-container">
    <h1>StockSync Admin</h1>
    <p>Gestion de inventarios y personal</p>

    <form id="loginForm">
        <label>
            <input type="email"    name="email"    placeholder="Email"      required>
        </label>
        <label>
            <input type="password" name="password" placeholder="Contrasena" required>
        </label>

        <p id="errorMsg" style="color:red; display:none;"></p>

        <button type="submit">Iniciar Sesion</button>
    </form>

    <div class="footer-links">
        <a th:href="@{/register}">No tienes cuenta? Registrate aqui</a>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());
        const errorMsg = document.getElementById('errorMsg');
        errorMsg.style.display = 'none';

        // 1. Validacion basica
        if (!data.email.trim() || !data.password) {
            errorMsg.textContent = 'Completa todos los campos.';
            errorMsg.style.display = 'block';
            return;
        }

        // 2. Feedback visual
        const btn = e.target.querySelector('button[type="submit"]');
        btn.disabled = true;
        btn.textContent = 'Iniciando...';

        try {
            const response = await fetch('/api/login', {  // ✅ ruta correcta
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            // 3. Leer body de forma segura
            let result = {};
            const contentType = response.headers.get('Content-Type');
            if (contentType && contentType.includes('application/json')) {
                result = await response.json();
            }

          if (response.ok) {
    localStorage.setItem('jwt', result.token);
    window.location.href = '/api/admin/dashboard';  // ✅ con context-path
} else {
    errorMsg.textContent = result.message
        || 'Credenciales incorrectas. Verifica tus datos.';
    errorMsg.style.display = 'block';
}

        } catch (error) {
            console.error('Error de conexion:', error);
            errorMsg.textContent = 'No se pudo conectar con el servidor.';
            errorMsg.style.display = 'block';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Iniciar Sesion';
        }
    });
</script>
</body>
</html>
