spring:
  application:
    name: StockSync Backend
  config:
    import: "optional:file:.env[.properties]"
  mvc:
    servlet:
      path: /api

  # --- Spring Mail Configuration (using Brevo SMTP) ---
  mail:
    host: smtp-relay.brevo.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # Database Configuration (Default profile for local development)
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  
  # JPA/Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # CORREGIDO: Asegurar que Spring maneje los recursos correctamente
  web:
    resources:
      static-locations: classpath:/static/
      add-mappings: true

  flyway:
    enabled: true
    baseline-on-migrate: true

# Server Configuration
server:
  port: 8080

# Logging Configuration
logging:
  level:
    org.springframework.security: INFO
    root: INFO
    com.stockSync: INFO

# Configuración personalizada de la aplicación
application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
  mail:
    from-email: jacobo.bustos.22@gmail.com
    from-name: "Equipo de StockSync"

---

# Production profile (for Render)
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}?sslmode=require
